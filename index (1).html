                        <button class="btn-cancel" onclick="window.hidePopup()">Cancel</button>
                    </div>
                `);
            };

            window.confirmDelete = function(userId) {
                db.ref(`users/${userId}`).remove()
                    .then(async () => {
                        hidePopup();
                        await loadAllUsers();
                        showToast(`User "${userId}" deleted.`, 'success');
                    })
                    .catch(e => {
                        console.error('Delete error:', e);
                        showToast('Error deleting user.', 'error');
                    });
            };

            // ----- CLEAR ALL DATA -----
            document.getElementById('btnClearAllData').addEventListener('click', () => {
                showPopup(`
                    <h3><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i> Clear All Data</h3>
                    <div style="text-align:center;padding:16px 0;color:var(--text-light);">
                        <p style="font-size:1.1rem;margin-bottom:8px;font-weight:600;">
                            ⚠️ WARNING: This will delete <strong>ALL</strong> users and their data.
                        </p>
                        <p style="color:var(--danger);font-weight:600;font-size:0.95rem;">
                            <i class="fas fa-exclamation-circle"></i> This action cannot be undone!
                        </p>
                    </div>
                    <div class="form-group" style="margin-top:12px;">
                        <label>Type <strong style="color:var(--danger);">"DELETE ALL"</strong> to confirm:</label>
                        <input type="text" id="confirmDeleteAll" placeholder='Type "DELETE ALL"' />
                    </div>
                    <div class="popup-actions">
                        <button class="btn-danger" onclick="window.confirmClearAll()"><i class="fas fa-trash-alt"></i> Delete All</button>
                        <button class="btn-cancel" onclick="window.hidePopup()">Cancel</button>
                    </div>
                `);
            });

            window.confirmClearAll = function() {
                const input = document.getElementById('confirmDeleteAll');
                if (!input || input.value !== 'DELETE ALL') {
                    showToast('Please type "DELETE ALL" to confirm.', 'warning');
                    return;
                }

                db.ref('users').remove()
                    .then(async () => {
                        hidePopup();
                        await loadAllUsers();
                        showToast('All user data cleared.', 'info');
                    })
                    .catch(e => {
                        console.error('Clear data error:', e);
                        showToast('Error clearing data.', 'error');
                    });
            };

            // ----- EXPOSE FUNCTIONS TO GLOBAL -----
            window.hidePopup = hidePopup;
            window.viewUser = window.viewUser;
            window.editUser = window.editUser;
            window.sendSalary = window.sendSalary;
            window.deleteUser = window.deleteUser;
            window.createUser = window.createUser;
            window.saveEdit = window.saveEdit;
            window.sendSalaryConfirm = window.sendSalaryConfirm;
            window.resetUser = window.resetUser;
            window.viewLogs = window.viewLogs;
            window.confirmDelete = window.confirmDelete;
            window.confirmClearAll = window.confirmClearAll;
            window.filterUsers = window.filterUsers;
            window.toggleSelectAll = window.toggleSelectAll;
            window.editLoginTime = window.editLoginTime;
            window.saveLoginTime = window.saveLoginTime;
            window.saveGlobalHalfTime = window.saveGlobalHalfTime;

            // ----- INIT -----
            loadGlobalHalfTime();
            loadAllUsers();
            setInterval(loadAllUsers, 15000);

        })();
    </script>
</body>
</html>
